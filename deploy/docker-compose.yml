services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mockstarket}
      POSTGRES_USER: ${POSTGRES_USER:-mockstarket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mockstarket_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mockstarket}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-mockstarket}:${POSTGRES_PASSWORD:-mockstarket_dev}@postgres:5432/${POSTGRES_DB:-mockstarket}?sslmode=disable
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-mock-starket}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SIM_TICK_MS: ${SIM_TICK_MS:-2000}
      STARTING_CASH: ${STARTING_CASH:-100000}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080/ws}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-mock-starket}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - web

volumes:
  postgres_data:
